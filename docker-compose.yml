services:
  postgres:
    image: postgres:16-alpine
    container_name: golf-ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: marvel
      POSTGRES_PASSWORD: marvel
      POSTGRES_DB: marvel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
