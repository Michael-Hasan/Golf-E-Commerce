services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: golf-ecommerce-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: golf-ecommerce-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: golf_ecommerce
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

volumes:
  pgdata_prod:
